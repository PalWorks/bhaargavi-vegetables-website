name: Publish Catalog

# Lightweight, on-demand publish: re-read ProductCatalog from Google Sheets,
# rebuild, and deploy. Triggered manually, from the CLI (`gh workflow run
# publish.yml`), or by the spreadsheet's "Publish catalog to website" button
# (which sends a workflow_dispatch via the GitHub API).
on:
  workflow_dispatch:
  repository_dispatch:
    types: [publish-catalog]

permissions:
  contents: write
  deployments: write

# Serialize with the weekly sync so two runs never race on git push / deploy.
concurrency:
  group: bhaargavi-deploy
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch site config
        env:
          SKUITEMMASTER_GOOGLE_SHEETS_API_KEY: ${{ secrets.SKUITEMMASTER_GOOGLE_SHEETS_API_KEY }}
          BHAARGAVI_SHEETS_ID: ${{ secrets.BHAARGAVI_SHEETS_ID }}
        run: npm run fetch:config || true

      - name: Fetch menu from ProductCatalog
        env:
          SKUITEMMASTER_GOOGLE_SHEETS_API_KEY: ${{ secrets.SKUITEMMASTER_GOOGLE_SHEETS_API_KEY }}
          BHAARGAVI_SHEETS_ID: ${{ secrets.BHAARGAVI_SHEETS_ID }}
        run: |
          if [ -z "$SKUITEMMASTER_GOOGLE_SHEETS_API_KEY" ]; then
            echo "::error::SKUITEMMASTER_GOOGLE_SHEETS_API_KEY not set — cannot sync catalog."
            exit 1
          fi
          npm run fetch:menu

      - name: Commit refreshed data
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # Commit local changes first, then rebase onto remote (autostash handles any
          # residue), so a concurrent update never aborts the pull or blocks the deploy.
          git add src/data/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: publish catalog from ProductCatalog sheet"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Build
        env:
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
          VITE_GOOGLE_PLACE_ID: ${{ secrets.VITE_GOOGLE_PLACE_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bhaargavi-website
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # Notify Bing/IndexNow so search engines recrawl on publish. The key is
      # public (served at keyLocation); a failed ping must not fail the deploy.
      - name: Ping IndexNow
        run: |
          BODY=$(node -e '
            const fs=require("fs");
            const xml=fs.readFileSync("dist/sitemap.xml","utf8");
            const urls=[...xml.matchAll(/<loc>([^<]+)<\/loc>/g)].map(m=>m[1]);
            process.stdout.write(JSON.stringify({
              host: process.env.HOST, key: process.env.KEY,
              keyLocation: `https://${process.env.HOST}/${process.env.KEY}.txt`,
              urlList: urls
            }));
          ')
          echo "Submitting $(node -e 'process.stdout.write(String(JSON.parse(process.argv[1]).urlList.length))' "$BODY") URLs to IndexNow"
          curl -sS -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "$BODY" -w '\nIndexNow HTTP %{http_code}\n' || true
        env:
          HOST: bhaargavifreshcuts.com
          KEY: ac86a13aece79a2e921d83a4a270ea1a
