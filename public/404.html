<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found | Bhaargavi Fresh Cuts</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

      :root { --green: #2E7D32; --green-light: #43A047; --cream: #FBF9F4; --dark: #1f2937; --muted: #6b7280; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--cream); color: var(--dark);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        text-align: center; padding: 24px;
      }
      .wrap { max-width: 460px; }
      img { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }
      h1 { font-size: 2rem; margin-bottom: 12px; }
      p { color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
      a.btn {
        display: inline-block; background: var(--green); color: #fff; text-decoration: none;
        font-weight: 600; padding: 12px 24px; border-radius: 12px; transition: background .2s;
      }
      a.btn:hover { background: var(--green-light); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="/BhaargaviLogo.jpg" alt="Bhaargavi Fresh Cuts" />
